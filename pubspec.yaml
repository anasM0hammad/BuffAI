name: BuffAI
description: Dead-simple gym workout logger. Log sets, see what you lifted last time.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_local_notifications: ^18.0.1
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3
  custom_lint:
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "web/icons/logo.jpg"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#0A0A0A"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "web/icons/logo.jpg"
  web:
    generate: true
    image_path: "web/icons/logo.jpg"
    background_color: "#0A0A0A"
    theme_color: "#E8352A"
  windows:
    generate: true
    image_path: "web/icons/logo.jpg"
    icon_size: 256
  macos:
    generate: true
    image_path: "web/icons/logo.jpg"
